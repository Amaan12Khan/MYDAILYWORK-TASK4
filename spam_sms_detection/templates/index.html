<!DOCTYPE html>
<html>
<head>
<title>Spam Detection</title>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    width: 500px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    border-radius: 10px;
    padding: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: #22c55e;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
}

.result {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="box">
    <h2>📩 Spam SMS Detector</h2>

    <form action="/predict" method="post">
        <textarea name="message" placeholder="Enter SMS here..."></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if prediction %}
        <div class="result">{{ prediction }}</div>
    {% endif %}
</div>

</body>
</html>
